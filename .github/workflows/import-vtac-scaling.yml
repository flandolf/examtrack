name: Import VTAC scaling reports

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "vtac/import-scaling-reports.mjs"
      - ".github/workflows/import-vtac-scaling.yml"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Import VTAC scaling reports
        run: bun run vtac:import

      - name: Validate generated data
        run: bun test tests/scaling.test.ts

      - name: Commit generated data
        run: |
          if git diff --quiet -- public/vtac-scaling-reports.json; then
            echo "VTAC scaling data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/vtac-scaling-reports.json
          git commit -m "Update VTAC scaling data"
          git push
